<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dario Fidanza — Presentations</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #07101f; color: #fff; font-family: 'Inter', system-ui, sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .wrap { max-width: 560px; width: 100%; padding: 60px 32px; }
  .overline { font-size: 11px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: rgba(255,255,255,0.4); margin-bottom: 16px; display: block; }
  h1 { font-size: 32px; font-weight: 700; margin-bottom: 48px; line-height: 1.2; }
  h1 span { color: #4f80f5; }
  .deck-list { display: flex; flex-direction: column; gap: 12px; }
  .deck { display: flex; align-items: center; justify-content: space-between; padding: 20px 24px; border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; text-decoration: none; color: #fff; transition: background 0.2s, border-color 0.2s; }
  .deck:hover { background: rgba(79,128,245,0.08); border-color: rgba(79,128,245,0.3); }
  .deck-title { font-size: 15px; font-weight: 600; }
  .deck-sub { font-size: 12px; color: rgba(255,255,255,0.4); margin-top: 3px; }
  .arrow { color: rgba(255,255,255,0.3); font-size: 18px; }
</style>
</head>
<body>
<div class="wrap">

  <div class="deck-list">

    </a>
    <a class="deck" href="orders-dashboard/">

        <div class="deck-title">Orders Dashboard</div>

      </div>

</div>
