<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Darío Fidanza</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,300;1,400&family=Hepta+Slab:wght@400;600;700;800&family=Noto+Sans:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared/nav.css">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #07101f; --bg2: #0d1a2e;
  --surface: rgba(255,255,255,0.04); --border: rgba(255,255,255,0.08); --border-strong: rgba(255,255,255,0.15);
  --text: #f0f4ff; --text-dim: #8fa8c4; --text-muted: #b8cce0;
  --accent: #4f80f5; --accent2: #7c5af5;
  --nav-h: 60px;
}
html, body { height: 100%; font-family: 'Inter', -apple-system, sans-serif; background: var(--bg); color: var(--text); overflow: hidden; }
html.light { --bg: #f4f6fb; --bg2: #eaecf5; --surface: rgba(0,0,0,0.03); --border: rgba(0,0,0,0.09); --border-strong: rgba(0,0,0,0.18); --text: #0d1a2e; --text-dim: #4a5e78; --text-muted: #6b80a0; }

/* NAV */
nav {
  position: fixed; top: 0; left: 0; right: 0; height: var(--nav-h); z-index: 100;
  display: flex; align-items: center; justify-content: space-between; padding: 0 40px;
  background: rgba(7,16,31,0.88); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  transition: background 0.3s;
}
html.light nav {
  background: rgba(244,246,251,0.92);
}
.nav-logo { font-size: 12px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text); text-decoration: none; opacity: 0.85; text-shadow: 0 0 18px rgba(79,128,245,0.28); flex-shrink: 0; }
.nav-pills { display: flex; background: rgba(255,255,255,0.04); border: 1px solid var(--border); border-radius: 100px; padding: 4px; gap: 2px; }
html.light .nav-pills { background: rgba(0,0,0,0.03); }
.nav-btn { font-size: 11px; font-weight: 500; letter-spacing: 0.05em; color: var(--text-dim); background: none; border: none; cursor: pointer; padding: 6px 16px; border-radius: 100px; transition: color 0.2s, background 0.2s, box-shadow 0.2s; white-space: nowrap; }
.nav-btn:hover { color: var(--text); background: rgba(255,255,255,0.06); }
.nav-btn.active { background: var(--accent); color: #fff; box-shadow: 0 0 14px rgba(79,128,245,0.35); }
.nav-right { display: flex; align-items: center; gap: 14px; flex-shrink: 0; }
.slide-counter { font-size: 11px; font-weight: 500; color: var(--text-muted); letter-spacing: 0.05em; min-width: 44px; text-align: right; }
.nav-arrows { display: flex; gap: 4px; }
.arrow-btn { width: 32px; height: 32px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface); color: var(--text-dim); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; font-size: 14px; }
.arrow-btn:hover { border-color: var(--border-strong); color: var(--text); }
.arrow-btn:disabled { opacity: 0.3; cursor: default; }
.theme-btn { background: none; border: none; cursor: pointer; font-size: 16px; opacity: 0.55; transition: opacity 0.2s; padding: 4px; }
.theme-btn:hover { opacity: 1; }

/* PROGRESS */
@keyframes progressShimmer { 0% { background-position: 0% center; } 100% { background-position: 200% center; } }
.progress-bar { position: fixed; top: var(--nav-h); left: 0; height: 2px; background: linear-gradient(90deg, var(--accent) 0%, var(--accent2) 50%, var(--accent) 100%); background-size: 200% auto; animation: progressShimmer 3s linear infinite; z-index: 99; transition: width 0.4s cubic-bezier(0.4,0,0.2,1); }

/* CONTENT AREA */
#deck-content {
  position: fixed; top: var(--nav-h); left: 0; right: 0; bottom: 0;
  overflow: hidden; z-index: 1;
}

/* Content fade for deck transitions */
#deck-content.fading-out { opacity: 0; transition: opacity 200ms ease; }
#deck-content.fading-in  { opacity: 0; }
#deck-content.faded-in   { opacity: 1; transition: opacity 320ms cubic-bezier(0.4,0,0.2,1); }

/* Loading spinner shown while fetching */
#deck-loading {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none; transition: opacity 0.2s;
  z-index: 10;
}
#deck-loading.visible { opacity: 1; }
.loading-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: rgba(79,128,245,0.5);
  animation: loadPulse 1.2s ease-in-out infinite;
}
.loading-dot:nth-child(2) { animation-delay: 0.2s; }
.loading-dot:nth-child(3) { animation-delay: 0.4s; }
.loading-dots { display: flex; gap: 8px; }
@keyframes loadPulse { 0%,80%,100% { transform: scale(0.6); opacity: 0.4; } 40% { transform: scale(1); opacity: 1; } }

/* MOBILE GATE */
.mobile-gate {
  display: none;
  position: fixed; inset: 0; z-index: 9999;
  background: var(--bg);
  flex-direction: column; align-items: center; justify-content: center;
  text-align: center; padding: 40px;
}
@media (max-width: 900px) {
  .mobile-gate { display: flex; }
  .slide, nav, .progress-bar { display: none !important; }
}

/* ══════════════════════════════════════════════════
   NAV TRANSITION ANIMATIONS (shell-specific overrides)
══════════════════════════════════════════════════ */

/* Disable nav.css navPillsIn on expanded — pills already animated during expanding */
.nav-project[data-state="expanded"] .nav-pills {
  animation: none !important;
}

/* ── EXPANDING: project name fades, section pills unfold from it ── */
.nav-project[data-state="expanding"] {
  justify-content: flex-start !important; /* anchor name at left edge */
}
.nav-project[data-state="expanding"] .nav-pills {
  display: flex !important;
}
.nav-project[data-state="expanding"] .nav-project-pill {
  flex-shrink: 0;
  animation: shellNameOut 180ms ease forwards;
  pointer-events: none;
}
.nav-project[data-state="expanding"] .nav-pills .nav-btn {
  animation: shellPillIn 220ms cubic-bezier(0.4, 0, 0.2, 1) both;
}
.nav-project[data-state="expanding"] .nav-pills .nav-btn:nth-child(1) { animation-delay: 30ms; }
.nav-project[data-state="expanding"] .nav-pills .nav-btn:nth-child(2) { animation-delay: 65ms; }
.nav-project[data-state="expanding"] .nav-pills .nav-btn:nth-child(3) { animation-delay: 100ms; }
.nav-project[data-state="expanding"] .nav-pills .nav-btn:nth-child(4) { animation-delay: 135ms; }
.nav-project[data-state="expanding"] .nav-pills .nav-btn:nth-child(5) { animation-delay: 170ms; }
.nav-project[data-state="expanding"] .nav-pills .nav-btn:nth-child(6) { animation-delay: 205ms; }
.nav-project[data-state="expanding"] .nav-pills .nav-btn:nth-child(7) { animation-delay: 240ms; }

/* ── COLLAPSING: section pills fold back, project name fades in ── */
.nav-project[data-state="collapsing"] {
  opacity: 1 !important;  /* override nav.css 0.45 — we control opacity at item level */
  justify-content: flex-start !important;
}
.nav-project[data-state="collapsing"] .nav-pills {
  display: flex !important;
  pointer-events: none;
}
.nav-project[data-state="collapsing"] .nav-project-pill {
  flex-shrink: 0;
  animation: shellNameIn 200ms 130ms ease both;
  pointer-events: none;
}
.nav-project[data-state="collapsing"] .nav-pills .nav-btn {
  animation: shellPillOut 160ms cubic-bezier(0.4, 0, 0.2, 1) both;
}
/* Reversed stagger: last pill exits first, toward project name */
.nav-project[data-state="collapsing"] .nav-pills .nav-btn:nth-child(7) { animation-delay: 0ms; }
.nav-project[data-state="collapsing"] .nav-pills .nav-btn:nth-child(6) { animation-delay: 15ms; }
.nav-project[data-state="collapsing"] .nav-pills .nav-btn:nth-child(5) { animation-delay: 30ms; }
.nav-project[data-state="collapsing"] .nav-pills .nav-btn:nth-child(4) { animation-delay: 45ms; }
.nav-project[data-state="collapsing"] .nav-pills .nav-btn:nth-child(3) { animation-delay: 60ms; }
.nav-project[data-state="collapsing"] .nav-pills .nav-btn:nth-child(2) { animation-delay: 75ms; }
.nav-project[data-state="collapsing"] .nav-pills .nav-btn:nth-child(1) { animation-delay: 90ms; }

@keyframes shellPillIn {
  from { opacity: 0; transform: translateX(-10px) scale(0.9); }
  to   { opacity: 1; transform: none; }
}
@keyframes shellPillOut {
  from { opacity: 1; transform: none; }
  to   { opacity: 0; transform: translateX(6px) scale(0.9); }
}
@keyframes shellNameOut {
  from { opacity: 1; }
  to   { opacity: 0; }
}
@keyframes shellNameIn {
  from { opacity: 0; }
  to   { opacity: 1; }
}
</style>
</head>
<body>

<div class="mobile-gate">
  <h2 style="font-size:24px;margin-bottom:16px">Best viewed on desktop</h2>
  <p style="font-size:16px;color:var(--text-dim);max-width:320px">This presentation is optimized for larger screens.</p>
</div>

<nav>
  <a class="nav-logo" href="./shell.html">Darío Fidanza</a>
  <div class="nav-center">
    <!-- Intro -->
    <div class="nav-project" data-project="intro" data-state="expanded">
      <button class="nav-project-pill" data-project="intro">Intro</button>
      <div class="nav-pills" id="pills-intro"></div>
    </div>
    <!-- Tooling DS -->
    <div class="nav-project" data-project="tds" data-state="collapsed">
      <button class="nav-project-pill" data-project="tds">Tooling DS</button>
      <div class="nav-pills" id="pills-tds"></div>
    </div>
    <!-- Orders Dashboard -->
    <div class="nav-project" data-project="orders" data-state="collapsed">
      <button class="nav-project-pill" data-project="orders">Orders Dashboard</button>
      <div class="nav-pills" id="pills-orders"></div>
    </div>
    <!-- Shopper Northstar -->
    <div class="nav-project" data-project="northstar" data-state="collapsed">
      <button class="nav-project-pill" data-project="northstar">Shopper Northstar</button>
      <div class="nav-pills" id="pills-northstar"></div>
    </div>
  </div>
  <div class="nav-right">
    <button class="theme-btn" id="themeBtn" title="Toggle light/dark">☀</button>
    <span class="slide-counter" id="counter">— / —</span>
    <div class="nav-arrows">
      <button class="arrow-btn" id="prevBtn">←</button>
      <button class="arrow-btn" id="nextBtn">→</button>
    </div>
  </div>
</nav>

<div class="progress-bar" id="progressBar" style="width:0%"></div>

<div id="deck-content">
  <div id="deck-loading">
    <div class="loading-dots">
      <div class="loading-dot"></div>
      <div class="loading-dot"></div>
      <div class="loading-dot"></div>
    </div>
  </div>
</div>

<script>
(function () {
  'use strict';

  /* ── Config ── */
  const DECKS = {
    intro: {
      path: 'intro/index.html', base: 'intro/', label: 'Intro',
      sections: [{ section: 'intro', label: 'Intro' }],
      sectionMap: { intro: 0 },
    },
    tds: {
      path: 'tooling-ds/index.html', base: 'tooling-ds/', label: 'Tooling DS',
      sections: [
        { section: 'problem',    label: 'Problem' },
        { section: 'system',     label: 'System' },
        { section: 'components', label: 'Components' },
        { section: 'impact',     label: 'Impact' },
      ],
      sectionMap: { problem: 0, system: 6, components: 15, impact: 26 },
    },
    orders: {
      path: 'orders-dashboard/index.html', base: 'orders-dashboard/', label: 'Orders Dashboard',
      sections: [
        { section: 'problem',    label: 'Problem' },
        { section: 'system',     label: 'System' },
        { section: 'components', label: 'Features' },
        { section: 'impact',     label: 'Impact' },
      ],
      sectionMap: { problem: 0, system: 6, components: 8, impact: 12 },
    },
    northstar: {
      path: 'northstar/index.html', base: 'northstar/', label: 'Shopper Northstar',
      sections: [
        { section: 'problem',    label: 'Problem' },
        { section: 'system',     label: 'System' },
        { section: 'components', label: 'Transformation' },
        { section: 'impact',     label: 'Impact' },
      ],
      sectionMap: { problem: 0, system: 5, components: 8, impact: 11 },
    },
  };

  const ANIM = 260;   // nav width transition (ms) — matches nav.css
  const FADE = 180;   // content fade (ms)

  /* ── State ── */
  let activeProject  = null;
  let deckSlides     = [];
  let deckTotal      = 0;
  let deckCurrent    = 0;
  let deckSections   = {};
  let deckNavBtns    = [];   // section pill buttons for active deck

  /* ── DOM refs ── */
  const content    = document.getElementById('deck-content');
  const loading    = document.getElementById('deck-loading');
  const counter    = document.getElementById('counter');
  const prevBtn    = document.getElementById('prevBtn');
  const nextBtn    = document.getElementById('nextBtn');
  const progressBar= document.getElementById('progressBar');

  /* ══════════════════════════════════════════════════════
     SLIDE NAVIGATION
  ══════════════════════════════════════════════════════ */
  function updateNav() {
    if (!deckTotal) return;
    counter.textContent = `${deckCurrent + 1} / ${deckTotal}`;
    prevBtn.disabled = deckCurrent === 0;
    nextBtn.disabled = deckCurrent === deckTotal - 1;
    progressBar.style.width = deckTotal > 1 ? (deckCurrent / (deckTotal - 1)) * 100 + '%' : '100%';

    // Highlight the correct section pill
    const section = deckSlides[deckCurrent]?.dataset?.section;
    deckNavBtns.forEach(b => b.classList.remove('active'));
    if (section) {
      const idx = Object.keys(deckSections).indexOf(section);
      if (idx >= 0) deckNavBtns[idx]?.classList.add('active');
    }
  }

  function goTo(i) {
    if (i < 0 || i >= deckTotal || i === deckCurrent) return;
    const prev = deckSlides[deckCurrent];
    prev.classList.remove('active');
    if (i > deckCurrent) {
      prev.classList.add('exit-up');
      setTimeout(() => prev.classList.remove('exit-up'), 500);
    }
    deckCurrent = i;
    deckSlides[deckCurrent].classList.add('active');
    updateNav();
    document.body.classList.add('has-navigated');
  }

  function nextSlide() { goTo(deckCurrent + 1); }
  function prevSlide()  { goTo(deckCurrent - 1); }
  function goToSection(name) { goTo(deckSections[name] ?? 0); }

  prevBtn.addEventListener('click', prevSlide);
  nextBtn.addEventListener('click', nextSlide);

  document.addEventListener('keydown', e => {
    if (e.target.tagName === 'TEXTAREA' || e.target.tagName === 'INPUT') return;
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown' || e.key === ' ') { e.preventDefault(); nextSlide(); }
    else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') { e.preventDefault(); prevSlide(); }
  });

  let touchX = 0;
  document.addEventListener('touchstart', e => { touchX = e.touches[0].clientX; });
  document.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - touchX;
    if (Math.abs(dx) > 50) { dx < 0 ? nextSlide() : prevSlide(); }
  });

  /* ══════════════════════════════════════════════════════
     THEME TOGGLE
  ══════════════════════════════════════════════════════ */
  document.getElementById('themeBtn').addEventListener('click', () => {
    document.documentElement.classList.toggle('light');
  });

  /* ══════════════════════════════════════════════════════
     DECK LOADER
  ══════════════════════════════════════════════════════ */
  // Cache for prefetched deck HTML (avoids re-fetching)
  const deckCache = {};

  function prefetchDeck(projectKey) {
    const deck = DECKS[projectKey];
    if (!deck || deckCache[projectKey]) return;
    deckCache[projectKey] = fetch(deck.path).then(r => r.text());
  }

  async function loadDeck(projectKey) {
    const deck = DECKS[projectKey];
    if (!deck) return;

    // Use prefetched HTML if available, otherwise fetch now
    let html;
    try {
      html = await (deckCache[projectKey] || fetch(deck.path).then(r => r.text()));
      deckCache[projectKey] = Promise.resolve(html); // ensure it stays cached
    } catch (e) {
      console.error('Failed to load deck:', e);
      return;
    }

    // Parse for slide and style/script extraction
    const parser = new DOMParser();
    const doc = parser.parseFromString(html, 'text/html');

    // ── Collect ALL .slide elements. Some decks have slides scattered outside
    //    #slides due to div imbalances, so gather them all.
    const slidesContainer = document.createElement('div');
    slidesContainer.id = 'slides';
    doc.querySelectorAll('.slide').forEach(slide => slidesContainer.appendChild(slide));

    // Rewrite relative image src paths
    slidesContainer.querySelectorAll('[src]').forEach(el => {
      const src = el.getAttribute('src');
      if (src && !src.startsWith('http') && !src.startsWith('data:') && !src.startsWith('/')) {
        el.setAttribute('src', deck.base + src);
      }
    });
    // Rewrite background-image inline styles
    slidesContainer.querySelectorAll('[style]').forEach(el => {
      const s = el.getAttribute('style');
      if (s && s.includes('url(')) {
        el.setAttribute('style', s.replace(/url\(['"]?(?!http|data:|\/)(.*?)['"]?\)/g,
          (_, p) => `url('${deck.base}${p}')`));
      }
    });

    // Inject deck-specific styles (only once per deck)
    const deckStyle = doc.querySelector('style');
    const styleId = `deck-style-${projectKey}`;
    if (!document.getElementById(styleId) && deckStyle) {
      const s = document.createElement('style');
      s.id = styleId;
      s.textContent = deckStyle.textContent;
      document.head.appendChild(s);
    }

    // Use static section map from config (no extraction needed)
    deckSections = deck.sectionMap;

    // Point nav buttons to the (already populated) pills for this deck
    const pillsContainer = document.getElementById(`pills-${projectKey}`);
    deckNavBtns = pillsContainer ? Array.from(pillsContainer.querySelectorAll('.nav-btn')) : [];

    // Swap content
    content.innerHTML = '';
    content.appendChild(slidesContainer);

    // Re-initialize deck state
    deckSlides  = Array.from(content.querySelectorAll('.slide'));
    deckTotal   = deckSlides.length;
    deckCurrent = 0;
    if (deckSlides[0]) deckSlides[0].classList.add('active');

    // Re-run canvas/deck-specific inline script
    const scriptEl = doc.querySelector('body script');
    if (scriptEl) {
      const newScript = document.createElement('script');
      newScript.textContent = scriptEl.textContent
        .replace(/document\.addEventListener\('keydown'[\s\S]*?\}\s*\)\s*;/, '/* keydown: shell */')
        .replace(/document\.addEventListener\('touchstart'[\s\S]*?\}\s*\)\s*;/, '/* touch: shell */')
        .replace(/document\.addEventListener\('touchend'[\s\S]*?\}\s*\)\s*;/, '/* touch: shell */')
        .replace(/deckSend\([^)]*\)\s*;?/g, '/* deckSend disabled */')
        .replace(/updateNotesPanel\(\)\s*;?/g, '/* notes disabled */');
      document.body.appendChild(newScript);
    }

    updateNav();
  }

  /* ══════════════════════════════════════════════════════
     PROJECT SWITCHER (nav animation)
  ══════════════════════════════════════════════════════ */
  function switchToProject(newKey) {
    if (newKey === activeProject) return;

    const expandedEl = document.querySelector(`.nav-project[data-project="${activeProject}"]`);
    const targetEl   = document.querySelector(`.nav-project[data-project="${newKey}"]`);
    if (!expandedEl || !targetEl) return;

    // Start fetch immediately — parallel with the nav animation
    const deckReady = loadDeck(newKey);

    // Measure natural widths before touching anything
    const bigW   = expandedEl.getBoundingClientRect().width;
    const smallW = targetEl.getBoundingClientRect().width;

    // Pin both to current widths, then animate in next frames
    expandedEl.style.width = bigW + 'px';
    targetEl.style.width   = smallW + 'px';

    requestAnimationFrame(() => {
      expandedEl.dataset.state = 'collapsing';
      targetEl.dataset.state   = 'expanding';

      requestAnimationFrame(() => {
        expandedEl.style.width = smallW + 'px';
        targetEl.style.width   = bigW + 'px';
      });
    });

    // Fade content out immediately — don't wait for nav to finish
    content.style.transition = `opacity ${FADE}ms ease`;
    content.style.opacity = '0';

    // After nav animation settles, update state
    setTimeout(() => {
      expandedEl.dataset.state = 'collapsed';
      targetEl.dataset.state   = 'expanded';
      expandedEl.style.width   = '';
      targetEl.style.width     = '';
      activeProject = newKey;
      history.pushState({ project: newKey }, '', `?p=${newKey}`);
    }, ANIM + 20);

    // Once deck is loaded AND nav has settled, fade content in
    Promise.all([deckReady, new Promise(r => setTimeout(r, ANIM + 20))]).then(() => {
      requestAnimationFrame(() => {
        content.style.transition = `opacity ${FADE}ms cubic-bezier(0.4,0,0.2,1)`;
        content.style.opacity = '1';
      });
    });
  }

  /* ══════════════════════════════════════════════════════
     INIT
  ══════════════════════════════════════════════════════ */

  // ── Pre-populate ALL pill containers from static config.
  //    Pills are always ready — no waiting for deck fetch.
  Object.entries(DECKS).forEach(([key, deck]) => {
    const pillsContainer = document.getElementById(`pills-${key}`);
    if (!pillsContainer) return;
    deck.sections.forEach(({ section, label }) => {
      const btn = document.createElement('button');
      btn.className = 'nav-btn';
      btn.textContent = label;
      btn.addEventListener('click', () => goToSection(section));
      pillsContainer.appendChild(btn);
    });
  });

  // ── Wire up project pills
  document.querySelectorAll('.nav-project-pill').forEach(btn => {
    const proj = btn.closest('.nav-project')?.dataset?.project;
    if (!proj) return;
    btn.addEventListener('click', () => switchToProject(proj));
    // Prefetch on hover so content is likely ready before click
    btn.addEventListener('mouseenter', () => prefetchDeck(proj));
  });

  // Determine starting project from URL param or default
  const urlP = new URLSearchParams(location.search).get('p');
  const startProject = (urlP && DECKS[urlP]) ? urlP : 'intro';

  // Set initial nav state
  document.querySelectorAll('.nav-project').forEach(el => {
    el.dataset.state = el.dataset.project === startProject ? 'expanded' : 'collapsed';
  });
  activeProject = startProject;

  // Start prefetching all other decks in background after a short delay
  setTimeout(() => {
    Object.keys(DECKS).forEach(key => { if (key !== startProject) prefetchDeck(key); });
  }, 1500);

  // Load initial deck — start with opacity 0, fade in when ready
  content.style.opacity = '0';
  loadDeck(startProject).then(() => {
    content.style.transition = 'opacity 380ms cubic-bezier(0.4,0,0.2,1)';
    requestAnimationFrame(() => {
      requestAnimationFrame(() => { content.style.opacity = '1'; });
    });
  });

  // Handle browser back/forward
  window.addEventListener('popstate', e => {
    const proj = e.state?.project;
    if (proj && DECKS[proj] && proj !== activeProject) {
      document.querySelectorAll('.nav-project').forEach(el => {
        el.dataset.state = el.dataset.project === proj ? 'expanded' : 'collapsed';
        el.style.width = '';
      });
      activeProject = proj;
      content.style.opacity = '0';
      loadDeck(proj).then(() => {
        content.style.transition = 'opacity 320ms cubic-bezier(0.4,0,0.2,1)';
        requestAnimationFrame(() => {
          requestAnimationFrame(() => { content.style.opacity = '1'; });
        });
      });
    }
  });

}());
</script>
</body>
</html>
