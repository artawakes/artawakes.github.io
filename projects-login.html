<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project Access · Dario Fidanza</title>
<meta name="robots" content="noindex">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hepta+Slab:wght@300;400;500;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

<style>
:root{
  --bg:#07101f; --bg2:#0d1a2e; --bg3:#12233b; --bg4:#182c48;
  --text:#f0f4ff; --dim:#8fa8c4; --faint:#5a7396;
  --blue:#4f80f5; --violet:#7c5af5; --magenta:#c55af5; --green:#3dba7e;
  --line:rgba(143,168,196,.14);
  --glass:rgba(13,26,46,.7);
  --fade:rgba(7,16,31,.85);
}
html:not(.dark){
  --bg:#f4f6fd; --bg2:#ffffff; --bg3:#e8edf9; --bg4:#dde5f5;
  --text:#07101f; --dim:#3a5070; --faint:#6b80a0;
  --line:rgba(7,16,31,.12);
  --glass:rgba(255,255,255,.7);
  --fade:rgba(244,246,253,.9);
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;align-items:center;justify-content:center;transition:background .3s,color .3s}
h1{font-family:'Hepta Slab',serif;font-weight:400;letter-spacing:-.02em}
a{color:inherit;text-decoration:none}

#flow{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.85;mask-image:linear-gradient(180deg,#000 0%,#000 55%,transparent 100%);-webkit-mask-image:linear-gradient(180deg,#000 0%,#000 55%,transparent 100%)}

/* header: back + wordmark on one baseline, toggle right */
nav{position:fixed;top:0;left:0;right:0;z-index:50;display:flex;align-items:center;justify-content:space-between;padding:16px 40px;min-height:76px;background:linear-gradient(180deg,var(--fade),transparent)}
.nav-left{display:flex;align-items:center;gap:6px}
.back{display:inline-flex;align-items:center;justify-content:center;width:34px;height:34px;border-radius:50%;color:var(--dim);font-size:16px;transition:.2s}
.back:hover{color:var(--text);background:var(--bg3)}
.wordmark{display:inline-flex;align-items:center;font-family:'Hepta Slab',serif;font-size:17px;letter-spacing:-.02em;line-height:34px}
.wordmark b{background:linear-gradient(90deg,var(--blue),var(--magenta));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;font-weight:700}
.theme{display:inline-flex;align-items:center;justify-content:center;width:34px;height:34px;border-radius:50%;color:var(--dim);font-size:14.5px;border:1px solid var(--line);background:var(--glass);cursor:pointer;transition:.2s}
.theme:hover{color:var(--text)}
html.dark .icon-moon{display:none}
html:not(.dark) .icon-sun{display:none}

/* access card */
.card{position:relative;z-index:2;width:min(420px,calc(100vw - 48px));border-radius:22px;border:1px solid var(--line);background:linear-gradient(170deg,var(--bg2),var(--bg));padding:40px 36px;text-align:center;box-shadow:0 30px 80px rgba(0,0,0,.35)}
.card .glow{position:absolute;top:-1px;left:28px;right:28px;height:1px;background:linear-gradient(90deg,transparent,var(--violet),transparent)}
.lock-ring{width:56px;height:56px;border-radius:50%;margin:0 auto 22px;padding:2px;background:conic-gradient(from 210deg,var(--blue),var(--violet),var(--magenta),var(--blue))}
.lock-ring .inner{width:100%;height:100%;border-radius:50%;background:var(--bg2);display:flex;align-items:center;justify-content:center;color:var(--blue);font-size:20px}
h1{font-size:30px;margin-bottom:10px}
.sub{font-size:13.5px;color:var(--dim);line-height:1.6;margin-bottom:30px}
label{display:block;text-align:left;font-size:12px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--faint);margin-bottom:8px}
input{width:100%;height:48px;padding:0 16px;border-radius:12px;border:1px solid var(--line);background:var(--bg);color:var(--text);font-size:14px;font-family:'Inter',sans-serif;outline:none;transition:.2s;margin-bottom:18px}
input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(79,128,245,.2)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;width:100%;height:50px;border-radius:999px;border:none;cursor:pointer;font-size:14px;font-weight:600;font-family:'Inter',sans-serif;background:linear-gradient(92deg,var(--blue),var(--violet));color:#fff;box-shadow:0 10px 34px rgba(79,128,245,.4);transition:.2s}
.btn:hover{transform:translateY(-2px)}
.err{font-size:12.5px;color:#FF6332;margin-top:14px;display:none}
.err.show{display:block}
.request{display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:600;color:var(--blue);margin-top:24px}
.request:hover{text-decoration:underline}
</style>
</head>
<body>
<canvas id="flow" aria-hidden="true"></canvas>

<nav>
  <div class="nav-left">
    <a class="back" href="index.html" aria-label="Back to home"><i class="bi bi-arrow-left"></i></a>
    <a class="wordmark" href="index.html"><span><b>Dario</b>&nbsp;Fidanza</span></a>
  </div>
  <button class="theme" onclick="toggleDarkMode()" aria-label="Toggle dark mode"><i class="bi bi-sun-fill icon-sun"></i><i class="bi bi-moon-fill icon-moon"></i></button>
</nav>

<form class="card" id="loginForm" onsubmit="return checkPassword(event)">
  <div class="glow"></div>
  <div class="lock-ring"><div class="inner"><i class="bi bi-lock-fill"></i></div></div>
  <h1>Project Access</h1>
  <p class="sub">Case studies are password protected.<br>Enter the password to continue.</p>
  <label for="password">Password</label>
  <input type="password" id="password" autocomplete="current-password" required autofocus>
  <button class="btn" type="submit">Access Projects</button>
  <p class="err" id="err">That password didn't match. Try again?</p>
  <a class="request" href="mailto:varnish-beehive.4s@icloud.com?subject=Project%20access%20request">Don't have it? Email me ↗</a>
</form>

<script>
function checkPassword(event) {
  event.preventDefault();
  const password = document.getElementById('password').value;
  if (password === '*Insta-2025*') {
    sessionStorage.setItem('projectsAuthenticated', 'true');
    window.location.href = 'l/presso/';
  } else {
    document.getElementById('err').classList.add('show');
    document.getElementById('password').value = '';
    document.getElementById('password').focus();
  }
  return false;
}

function toggleDarkMode() {
  document.documentElement.classList.toggle('dark');
  localStorage.setItem('darkMode', document.documentElement.classList.contains('dark'));
}
(function () {
  const stored = localStorage.getItem('darkMode');
  const dark = stored === null ? true : stored === 'true';
  document.documentElement.classList.toggle('dark', dark);
})();

/* flowing contour lines, same as the homepage */
(function () {
  const canvas = document.getElementById('flow');
  const ctx = canvas.getContext('2d');
  let w, h, t = 0;
  const reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  const LINES = 22;
  function resize() { canvas.width = w = innerWidth; canvas.height = h = innerHeight; }
  function render() {
    ctx.clearRect(0, 0, w, h);
    const dark = document.documentElement.classList.contains('dark');
    for (let i = 0; i < LINES; i++) {
      const yBase = (i / (LINES - 1)) * h * 1.1 - h * 0.05;
      const p = i / LINES;
      const r = dark ? Math.round(79 + p * 118) : Math.round(50 + p * 100);
      const g = dark ? Math.round(128 - p * 38) : Math.round(90 - p * 30);
      const b = dark ? 245 : 215;
      const alpha = (0.09 + 0.16 * Math.sin(p * Math.PI)) * (i % 4 === 0 ? 1.6 : 1) * (dark ? 1 : 0.55);
      ctx.beginPath();
      for (let x = 0; x <= w; x += 8) {
        const y = yBase
          + Math.sin(x * 0.003 + t * 0.7 + i * 0.45) * 34
          + Math.sin(x * 0.0011 - t * 0.4 + i * 0.8) * 52
          + Math.sin(x * 0.006 + t * 1.1 + i * 0.2) * 10;
        x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      }
      ctx.strokeStyle = `rgba(${r},${g},${b},${alpha})`;
      ctx.lineWidth = i % 4 === 0 ? 1.5 : 1.1;
      ctx.stroke();
    }
  }
  function loop() { t += 0.012; render(); requestAnimationFrame(loop); }
  addEventListener('resize', resize);
  resize();
  if (reduce) { render(); } else { requestAnimationFrame(loop); }
})();
</script>
<script data-goatcounter="https://dfcom.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
</body>
</html>
