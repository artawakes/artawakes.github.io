<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projects Login - Dario Fidanza</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Fonts: Inter (body) + Hepta Slab (headings), matches the deck -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Hepta+Slab:wght@400;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.7.2/font/bootstrap-icons.css">
    
    <script>
        // Copy the tailwind config from Index.html
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Hepta Slab', 'serif'],
                    },
                    colors: {
                        border: "hsl(var(--border))",
                        input: "hsl(var(--input))",
                        ring: "hsl(var(--ring))",
                        background: "hsl(var(--background))",
                        foreground: "hsl(var(--foreground))",
                        primary: {
                            DEFAULT: "hsl(var(--primary))",
                            foreground: "hsl(var(--primary-foreground))",
                        },
                        secondary: {
                            DEFAULT: "hsl(var(--secondary))",
                            foreground: "hsl(var(--secondary-foreground))",
                        },
                        card: {
                            DEFAULT: "hsl(var(--card))",
                            foreground: "hsl(var(--card-foreground))",
                        },
                    },
                }
            }
        }
    </script>
    
    <style>
        /* Deck-matched tokens (same mapping as the homepage) */
        :root {
            --background: 228 60% 97%;
            --foreground: 218 64% 7%;
            --card: 0 0% 100%;
            --card-foreground: 218 64% 7%;
            --primary: 222 89% 60%;
            --primary-foreground: 0 0% 100%;
            --secondary: 228 40% 92%;
            --secondary-foreground: 218 64% 7%;
            --muted-foreground: 216 32% 38%;
            --border: 220 24% 86%;
            --input: 220 24% 86%;
            --ring: 222 89% 60%;
            --radius: 0.5rem;
        }

        .dark {
            --background: 218 64% 7%;
            --foreground: 225 100% 97%;
            --card: 214 56% 11%;
            --card-foreground: 225 100% 97%;
            --primary: 222 89% 64%;
            --primary-foreground: 0 0% 100%;
            --secondary: 214 35% 16%;
            --secondary-foreground: 225 100% 97%;
            --muted-foreground: 212 31% 66%;
            --border: 213 30% 18%;
            --input: 213 30% 18%;
            --ring: 222 89% 64%;
        }

        h1, h2, h3 { font-family: 'Hepta Slab', serif; font-weight: 500; letter-spacing: -0.02em; }
        h1.font-bold { font-weight: 500; }

        /* Subtle dot-grid backdrop, calmer cousin of the deck cover */
        body { position: relative; }
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            background-image: radial-gradient(circle, rgba(79,128,245,0.14) 1px, transparent 1px);
            background-size: 30px 30px;
            -webkit-mask-image: radial-gradient(ellipse 70% 60% at 50% 42%, #000 0%, transparent 75%);
            mask-image: radial-gradient(ellipse 70% 60% at 50% 42%, #000 0%, transparent 75%);
        }
        html:not(.dark) body::before {
            background-image: radial-gradient(circle, rgba(50,90,210,0.16) 1px, transparent 1px);
        }
        body > * { position: relative; z-index: 1; }
    </style>
</head>
<body class="bg-background text-foreground min-h-screen flex items-center justify-center">
    <div class="w-full max-w-md p-8">
        <div class="text-center mb-8 relative">
            <a href="index.html" class="absolute left-0 top-0 p-2 text-muted-foreground hover:text-foreground transition-colors" aria-label="Back to home">
                <i class="bi bi-arrow-left text-xl"></i>
            </a>
            <a href="index.html">
                <img src="Assets/logo.svg" alt="Dario Fidanza" class="h-12 mx-auto mb-4 block dark:hidden">
                <img src="Assets/LogoWhite.svg" alt="Dario Fidanza" class="h-12 mx-auto mb-4 hidden dark:block">
            </a>
            <h1 class="text-2xl font-bold">Project Access</h1>
            <p class="text-muted-foreground mt-2">Please enter the password to view projects</p>
        </div>
        
        <div class="bg-card p-6 rounded-lg border">
            <form id="loginForm" onsubmit="return checkPassword(event)">
                <div class="mb-4">
                    <label for="password" class="block text-sm font-medium mb-2">Password</label>
                    <input 
                        type="password" 
                        id="password" 
                        class="w-full px-3 py-2 border rounded-md bg-background text-foreground"
                        required
                    >
                </div>
                <button 
                    type="submit" 
                    class="w-full inline-flex items-center justify-center rounded-md text-sm font-medium ring-offset-background transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 disabled:pointer-events-none disabled:opacity-50 bg-primary text-primary-foreground hover:bg-primary/90 h-10 px-4"
                >
                    Access Projects
                </button>
            </form>
        </div>
    </div>

    <script>
        function checkPassword(event) {
            event.preventDefault();
            const password = document.getElementById('password').value;
            
            // Replace 'your_password_here' with the actual password you want to use
            if (password === '*Insta-2025*') {
                // Store authentication state
                sessionStorage.setItem('projectsAuthenticated', 'true');
                // Redirect to projects page
                window.location.href = 'l/presso/';
            } else {
                alert('Incorrect password');
            }
            return false;
        }
    </script>

    <!-- Add this script right after your existing scripts, before the closing </body> tag -->
    <script>
        // Check for saved dark mode preference when page loads
        document.addEventListener('DOMContentLoaded', () => {
            const stored = localStorage.getItem('darkMode');
            const darkMode = stored === null ? true : stored === 'true';
            if (darkMode) {
                document.documentElement.classList.add('dark');
            } else {
                document.documentElement.classList.remove('dark');
            }
        });

        // Update dark mode toggle function
        function toggleDarkMode() {
            document.documentElement.classList.toggle('dark');
            // Store the preference
            localStorage.setItem('darkMode', document.documentElement.classList.contains('dark'));
        }
    </script>
  <script data-goatcounter="https://dfcom.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
</body>
</html>
